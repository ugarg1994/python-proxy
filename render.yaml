services:
  - type: web
    name: python-proxy
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: UPSTREAM_BASE_URL
        sync: false
      - key: CTIX_ACCESS_ID
        sync: false
      - key: CTIX_SECRET_KEY
        sync: false
      - key: CTIX_SIGNATURE_TTL
        value: "25"
      - key: PROXY_TIMEOUT
        value: "60"
